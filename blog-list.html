<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブログ — SENTIC</title>
  <link rel="icon" type="image/jpeg" href="./assets/images/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050505;
      --white: #f5f0e8;
      --acid: #3ecc00;
      --gray: #1a1a1a;
      --mid: #333;
      --text-dim: #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; scrollbar-gutter: stable; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
      overflow-x: hidden; cursor: none; width: 100%; margin: 0; padding: 0;
    }

    /* CURSOR */
    .cursor {
      position: fixed; width: 12px; height: 12px;
      background: var(--acid); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed; width: 40px; height: 40px;
      border: 1px solid rgba(62,204,0,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%); transition: all 0.15s ease;
    }

    /* NOISE */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9990; opacity: 0.4;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 48px;
      background: var(--black);
      width: 100%; max-width: 100vw; box-sizing: border-box;
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; height: 40px; }
    .nav-logo img { height: 100%; width: auto; max-width: 150px; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--acid); }
    .nav-cta { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--acid); color: var(--acid); padding: 10px 24px; text-decoration: none; transition: all 0.3s; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
    .nav-cta:hover { background: var(--acid); color: var(--black); }

    /* SUB-HERO */
    .sub-hero {
      padding: 180px 48px 60px;
      background: var(--black);
    }
    .sub-hero-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--acid); letter-spacing: 0.3em; margin-bottom: 16px; }
    .sub-hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 10vw, 8rem); line-height: 0.9; }

    /* MAIN CONTENT LAYOUT */
    .blog-container {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 60px;
      padding: 40px 48px 120px;
      background: var(--black);
      min-height: 600px;
    }

    /* SIDEBAR */
    .blog-sidebar {
      position: sticky;
      top: 120px;
      height: fit-content;
    }
    .sidebar-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--acid);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--mid);
    }
    .blog-filter {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      border: none;
      color: var(--text-dim);
      text-align: left;
      cursor: none;
      transition: all 0.3s;
      padding: 4px 0;
      position: relative;
    }
    .filter-btn::before {
      content: '';
      position: absolute;
      left: -15px;
      top: 50%;
      width: 6px;
      height: 1px;
      background: var(--acid);
      transform: translateY(-50%) scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .filter-btn.active, .filter-btn:hover {
      color: var(--acid);
      padding-left: 15px;
    }
    .filter-btn.active::before, .filter-btn:hover::before {
      transform: translateY(-50%) scaleX(1);
    }

    /* BLOG GRID */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* BLOG CARD */
    .blog-card {
      position: relative;
      overflow: hidden;
      background: var(--gray);
      cursor: none;
      border: 1px solid var(--mid);
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      height: 100%;
    }

    .blog-card:hover {
      border-color: var(--acid);
      box-shadow: 0 8px 32px rgba(62, 204, 0, 0.1);
    }

    .blog-bg {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
    }

    .blog-card:hover .blog-bg {
      transform: scale(1.06);
    }

    .blog-overlay {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 20px 24px;
      flex: 1;
      opacity: 1;
      transition: opacity 0.4s;
      z-index: 2;
      background: var(--gray);
      justify-content: flex-start;
    }

    .blog-card:hover .blog-overlay {
      opacity: 1;
    }

    .blog-cat {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--acid);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: inline-block;
      padding: 4px 8px;
      background: rgba(62, 204, 0, 0.1);
      border-radius: 2px;
      width: fit-content;
    }

    .blog-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .blog-excerpt {
      display: none;
    }

    /* MODAL REMOVED - Using separate page for details */

    /* REVEAL */
    .reveal { 
      opacity: 0; 
      transform: translateY(30px); 
      transition: all 0.8s cubic-bezier(0.215, 0.61, 0.355, 1); 
    }
    .reveal.visible { 
      opacity: 1; 
      transform: translateY(0); 
    }

    /* BREADCRUMB */
    .breadcrumb { background: var(--black); border-top: 1px solid var(--mid); border-bottom: 1px solid var(--mid); padding: 20px 48px; position: relative; z-index: 50; }
    .breadcrumb-list { list-style: none; display: flex; gap: 12px; align-items: center; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-dim); }
    .breadcrumb-item { display: flex; align-items: center; }
    .breadcrumb-item a { color: var(--acid); text-decoration: none; transition: color 0.3s; }
    .breadcrumb-item a:hover { color: var(--white); }
    .breadcrumb-separator { color: var(--text-dim); margin: 0 8px; }
    .breadcrumb-current { color: var(--white); }

    /* FOOTER */
    footer { 
      padding: 80px 48px; 
      background: var(--black); 
      border-top: 1px solid var(--mid); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 40px; 
    }
    .footer-logo img { height: 40px; }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; }

    /* レスポンシブ */
    @media (max-width: 1024px) {
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .blog-container { grid-template-columns: 1fr; padding: 20px 24px 80px; }
      .blog-sidebar { position: static; margin-bottom: 40px; }
      .blog-filter { flex-direction: row; flex-wrap: wrap; gap: 16px; }
      .nav-links { display: none; }
    }

    @media (max-width: 480px) {
      .blog-grid { grid-template-columns: 1fr; }
      .sub-hero-title { font-size: 3.5rem; }
      .blog-modal-content { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="./index.html" class="nav-logo">
    <img src="./assets/images/senticllc_logo_s.png" alt="SENTIC Logo">
  </a>
  <div class="nav-links">
    <a href="./index.html#services">Services</a>
    <a href="./works.html">Works</a>
    <a href="./company.html">Company</a>
    <a href="./blog-list.html" style="color:var(--acid)">Blog</a>
  </div>
  <a href="mailto:info@sentic.jp" class="nav-cta">Contact</a>
</nav>

<div class="sub-hero">
  <div class="sub-hero-label reveal">— ARTICLES —</div>
  <h1 class="sub-hero-title reveal">LATEST<br><span style="color:var(--acid)">BLOG</span></h1>
</div>

<div class="blog-container">
  <aside class="blog-sidebar reveal">
    <h2 class="sidebar-title">カテゴリー</h2>
    <div class="blog-filter" id="blogFilter">
      <button class="filter-btn active" data-filter="ALL">すべて</button>
    </div>
  </aside>

  <main class="blog-content reveal">
    <div class="blog-grid" id="blogGrid">
      <!-- Blog posts will be loaded here -->
    </div>
  </main>
</div>

<nav class="breadcrumb">
  <ul class="breadcrumb-list">
    <li class="breadcrumb-item"><a href="./index.html">TOP</a></li>
    <li class="breadcrumb-separator">/</li>
    <li class="breadcrumb-item breadcrumb-current">BLOG</li>
  </ul>
</nav>

<footer>
  <div class="footer-logo"><img src="./assets/images/senticllc_logo_s.png" alt="SENTIC Logo"></div>
  <div class="footer-copy">© 2024 SENTIC LLC. ALL RIGHTS RESERVED.</div>
</footer>

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
function animateRing(){
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animateRing);
}
animateRing();

function setupCursorEffects() {
  document.querySelectorAll('a,button,.blog-card,.filter-btn').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.style.width='20px';cursor.style.height='20px';ring.style.width='60px';ring.style.height='60px';});
    el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='40px';ring.style.height='40px';});
  });
}

// SCROLL REVEAL
const observer = new IntersectionObserver((entries)=>{
  entries.forEach((entry,i)=>{
    if(entry.isIntersecting){ setTimeout(()=>entry.target.classList.add('visible'),i*100); observer.unobserve(entry.target); }
  });
},{threshold:0.1});

// INITIALIZE
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
  setupCursorEffects();
  loadBlogPosts();
});

// Load blog posts from microCMS
let allBlogPosts = [];
let allBlogCategories = [];

async function fetchBlogPosts() {
  try {
    const response = await fetch('/api/blogs');
    if (!response.ok) throw new Error(`API Error: ${response.status}`);
    const data = await response.json();
    return data.contents || [];
  } catch (error) {
    console.error('Failed to fetch blog posts:', error);
    return [];
  }
}

async function fetchBlogCategories() {
  try {
    const response = await fetch('/api/categories');
    if (!response.ok) throw new Error(`API Error: ${response.status}`);
    const data = await response.json();
    return data.contents || [];
  } catch (error) {
    console.error('Failed to fetch categories:', error);
    return [];
  }
}

function createBlogCard(post) {
  const thumbnail = post.eyecatch?.url || 'https://via.placeholder.com/600x400?text=No+Image';
  const title = post.title || 'Untitled';
  let categoryName = 'Other';
  if (post.category && post.category.name) {
    categoryName = post.category.name;
  }
  const id = post.id;

  const publishDate = post.publishedAt 
    ? new Date(post.publishedAt).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '.')
    : '';

  return `
    <div class="blog-card" data-blog-id="${id}" data-category="${categoryName}">
      <div class="blog-bg" style="background-image: url('${thumbnail}');"></div>
      <div class="blog-overlay">
        <span class="blog-cat">${categoryName}</span>
        <h3 class="blog-title">${title}</h3>
        <p class="blog-date">${publishDate}</p>
      </div>
    </div>
  `;
}

async function loadBlogPosts() {
  allBlogPosts = await fetchBlogPosts();
  allBlogCategories = await fetchBlogCategories();
  
  if (allBlogPosts.length === 0) {
    console.log('No blog posts found');
    return;
  }

  displayBlogPosts(allBlogPosts);
  generateFilterButtons();
  setupCursorEffects();
}

function displayBlogPosts(postsToDisplay) {
  const blogGrid = document.querySelector('.blog-grid');
  if (!blogGrid) return;

  blogGrid.innerHTML = '';
  postsToDisplay.forEach(post => {
    const cardHTML = createBlogCard(post);
    blogGrid.insertAdjacentHTML('beforeend', cardHTML);
  });

  attachBlogCardListeners(allBlogPosts);
  setupCursorEffects();
}

function generateFilterButtons() {
  const filterContainer = document.querySelector('.blog-filter');
  if (!filterContainer) return;

  filterContainer.innerHTML = '';

  const allButton = document.createElement('button');
  allButton.className = 'filter-btn active';
  allButton.dataset.filter = 'ALL';
  allButton.textContent = 'すべて';
  filterContainer.appendChild(allButton);

  allBlogCategories.forEach(category => {
    const button = document.createElement('button');
    button.className = 'filter-btn';
    button.dataset.filter = category.name;
    button.textContent = category.name;
    filterContainer.appendChild(button);
  });

  setupFilterButtons();
}

function setupFilterButtons() {
  const filterButtons = document.querySelectorAll('.filter-btn');
  
  filterButtons.forEach(button => {
    button.addEventListener('click', function() {
      filterButtons.forEach(btn => btn.classList.remove('active'));
      this.classList.add('active');
      
      const filterValue = this.dataset.filter;
      
      if (filterValue === 'ALL') {
        displayBlogPosts(allBlogPosts);
      } else {
        const filteredPosts = allBlogPosts.filter(post => {
          if (post.category && post.category.name) {
            return post.category.name === filterValue;
          }
          return false;
        });
        displayBlogPosts(filteredPosts);
      }
    });
  });
}

function attachBlogCardListeners(posts) {
  const cards = document.querySelectorAll('.blog-card[data-blog-id]');
  cards.forEach(card => {
    card.addEventListener('click', function() {
      const blogId = this.dataset.blogId;
      window.location.href = `./blog-detail.html?id=${blogId}`;
    });
  });
}
</script>
</body>
</html>
