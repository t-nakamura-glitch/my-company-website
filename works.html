<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKS — SENTIC</title>
<link rel="icon" type="image/jpeg" href="./assets/images/favicon.jpg">
<script src="./js/microcms.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050505;
    --white: #f5f0e8;
    --acid: #3ecc00;
    --red: #888;
    --gray: #1a1a1a;
    --mid: #333;
    --text-dim: #888;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; scrollbar-gutter: stable; }
  body {
    background: var(--black); color: var(--white);
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    overflow-x: hidden; cursor: none; width: 100%; margin: 0; padding: 0;
  }

  /* CURSOR */
  .cursor {
    position: fixed; width: 12px; height: 12px;
    background: var(--acid); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.3s, height 0.3s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed; width: 40px; height: 40px;
    border: 1px solid rgba(62,204,0,0.5); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%); transition: all 0.15s ease;
  }

  /* NOISE */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9990; opacity: 0.4;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 48px;
    background: var(--black);
    width: 100%; max-width: 100vw; box-sizing: border-box;
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; height: 40px; }
  .nav-logo img { height: 100%; width: auto; max-width: 150px; }
  .nav-links { display: flex; gap: 40px; }
  .nav-links a { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--acid); }
  .nav-cta { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--acid); color: var(--acid); padding: 10px 24px; text-decoration: none; transition: all 0.3s; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
  .nav-cta:hover { background: var(--acid); color: var(--black); }

  /* SUB-HERO */
  .sub-hero {
    padding: 180px 48px 60px;
    background: var(--black);
  }
  .sub-hero-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--acid); letter-spacing: 0.3em; margin-bottom: 16px; }
  .sub-hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 10vw, 8rem); line-height: 0.9; }

  /* MAIN CONTENT LAYOUT */
  .works-container {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 60px;
    padding: 40px 48px 120px;
    background: var(--black);
    min-height: 600px;
  }

  /* SIDEBAR */
  .works-sidebar {
    position: sticky;
    top: 120px;
    height: fit-content;
  }
  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--acid);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--mid);
  }
  .works-filter {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    color: var(--text-dim);
    text-align: left;
    cursor: none;
    transition: all 0.3s;
    padding: 4px 0;
    position: relative;
  }
  .filter-btn::before {
    content: '';
    position: absolute;
    left: -15px;
    top: 50%;
    width: 6px;
    height: 1px;
    background: var(--acid);
    transform: translateY(-50%) scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .filter-btn.active, .filter-btn:hover {
    color: var(--acid);
    padding-left: 15px;
  }
  .filter-btn.active::before, .filter-btn:hover::before {
    transform: translateY(-50%) scaleX(1);
  }

  /* WORKS GRID */
  .works-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px 30px;
  }
  .work-item {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: transparent;
    cursor: none;
    border: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .work-img-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    border: 1px solid var(--mid);
    transition: border-color 0.3s;
  }
  .work-item:hover .work-img-wrapper {
    border-color: var(--acid);
  }
  .work-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .work-item:hover .work-bg {
    transform: scale(1.1);
  }
  .work-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px;
  }
  .work-cat {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--acid);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    opacity: 0.8;
  }
  .work-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.4;
    color: var(--white);
    transition: color 0.3s;
  }
  .work-item:hover .work-title {
    color: var(--acid);
  }

  /* MODAL */
  .work-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 40px; cursor: auto; }
  .work-modal-content { background: var(--black); width: 100%; max-width: 1000px; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid var(--mid); }
  .work-modal-close { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--white); font-size: 2rem; cursor: pointer; z-index: 10; }
  .work-modal-img { width: 100%; height: auto; display: block; }
  .work-modal-info { padding: 48px; }
  .work-modal-category { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--acid); letter-spacing: 0.2em; display: block; margin-bottom: 16px; }
  .work-modal-title { font-family: 'Noto Sans JP', sans-serif; font-size: 2.5rem; margin-bottom: 24px; }
  .work-modal-date { font-family: 'Space Mono', monospace; color: var(--text-dim); margin-bottom: 32px; }
  .work-modal-content-text { line-height: 1.8; color: var(--text-dim); }
  .work-modal-content-text img { max-width: 100%; height: auto; margin: 20px 0; }

  /* REVEAL */
  .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.215, 0.61, 0.355, 1); }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* FOOTER */
  footer { padding: 80px 48px; background: var(--black); border-top: 1px solid var(--mid); display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .footer-logo img { height: 40px; }
  .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; }
  .footer-links { display: flex; gap: 32px; }
  .footer-links a { font-size: 0.75rem; color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
  .footer-links a:hover { color: var(--acid); }

  @media (max-width: 1200px) {
    .works-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 900px) {
    .works-container { grid-template-columns: 1fr; gap: 40px; padding: 20px 24px 80px; }
    .works-sidebar { position: static; }
    .works-filter { flex-direction: row; flex-wrap: wrap; }
    .sidebar-title { margin-bottom: 16px; }
  }
  @media (max-width: 600px) {
    nav { padding: 20px; }
    .nav-links { display: none; }
    .sub-hero { padding: 140px 24px 40px; }
    .works-grid { grid-template-columns: 1fr; }
    .work-modal { padding: 0; }
    .work-modal-info { padding: 24px; }
    .work-modal-title { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="./index.html" class="nav-logo">
    <img src="./assets/images/senticllc_logo_s.png" alt="SENTIC Logo">
  </a>
  <div class="nav-links">
    <a href="./index.html#services">Services</a>
    <a href="./works.html" style="color:var(--acid)">Works</a>
    <a href="./company.html">Company</a>
    <a href="./blog-list.html">Blog</a>
  </div>
  <a href="mailto:info@sentic.jp" class="nav-cta">Contact</a>
</nav>

<div class="sub-hero">
  <div class="sub-hero-label reveal">— CASE STUDIES —</div>
  <h1 class="sub-hero-title reveal">SELECTED<br><span style="color:var(--acid)">WORKS</span></h1>
</div>

<div class="works-container">
  <aside class="works-sidebar reveal">
    <h2 class="sidebar-title">Categories</h2>
    <div class="works-filter" id="worksFilter">
      <button class="filter-btn active" data-filter="ALL">ALL PROJECTS</button>
      <!-- Dynamic categories will be inserted here -->
    </div>
  </aside>

  <main class="works-content reveal">
    <div class="works-grid" id="worksGrid">
      <!-- Works will be loaded here -->
    </div>
  </main>
</div>

<footer>
  <div class="footer-logo"><img src="./assets/images/senticllc_logo_s.png" alt="SENTIC Logo"></div>
  <div class="footer-copy">© 2024 SENTIC LLC. ALL RIGHTS RESERVED.</div>
  <div class="footer-links">
    <a href="#">プライバシーポリシー</a>
    <a href="#">利用規約</a>
    <a href="#">採用情報</a>
  </div>
</footer>

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
function animateRing(){
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animateRing);
}
animateRing();

function setupCursorEffects() {
  document.querySelectorAll('a,button,.work-item,.filter-btn').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.style.width='20px';cursor.style.height='20px';ring.style.width='60px';ring.style.height='60px';});
    el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='40px';ring.style.height='40px';});
  });
}

// SCROLL REVEAL
const observer = new IntersectionObserver((entries)=>{
  entries.forEach((entry,i)=>{
    if(entry.isIntersecting){ setTimeout(()=>entry.target.classList.add('visible'),i*100); observer.unobserve(entry.target); }
  });
},{threshold:0.1});

// INITIALIZE
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
  setupCursorEffects();
});
</script>
</body>
</html>
