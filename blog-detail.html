<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブログ記事 - SENTIC</title>
  <link rel="icon" type="image/jpeg" href="./assets/images/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050505;
      --white: #f5f0e8;
      --acid: #3ecc00;
      --red: #888;
      --gray: #1a1a1a;
      --mid: #333;
      --text-dim: #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; scrollbar-gutter: stable; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
      overflow-x: hidden; cursor: none; width: 100%; margin: 0; padding: 0;
    }

    /* CURSOR */
    .cursor {
      position: fixed; width: 12px; height: 12px;
      background: var(--acid); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed; width: 40px; height: 40px;
      border: 1px solid rgba(62,204,0,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%); transition: all 0.15s ease;
    }

    /* NOISE */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9990; opacity: 0.4;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 48px;
      background: var(--black);
      backdrop-filter: none;
      width: 100%; max-width: 100vw; box-sizing: border-box; overflow: hidden;
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; height: 40px; }
    .nav-logo img { height: 100%; width: auto; max-width: 150px; }
    .nav-logo span { color: var(--acid); }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--acid); }
    .nav-cta { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--acid); color: var(--acid); padding: 10px 24px; text-decoration: none; transition: all 0.3s; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
    .nav-cta:hover { background: var(--acid); color: var(--black); }

    /* BLOG DETAIL SECTION */
    .blog-hero {
      min-height: 60vh; display: flex; flex-direction: column; justify-content: flex-end;
      padding: 160px 48px 80px; position: relative; overflow: hidden; width: 100%; max-width: 100vw; box-sizing: border-box;
      background: linear-gradient(135deg, rgba(10,26,0,0.4) 0%, rgba(26,0,0,0.4) 100%), var(--black);
    }
    .blog-hero-img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
    }
    .blog-hero-overlay {
      position: absolute; inset: 0; background: rgba(5,5,5,0.5); z-index: 1;
    }
    .blog-hero-content {
      position: relative; z-index: 10; max-width: 900px;
    }
    .blog-hero-meta {
      display: flex; gap: 24px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;
    }
    .blog-hero-category {
      font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--acid); padding: 8px 16px;
      border: 1px solid var(--acid); clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .blog-hero-date {
      font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .blog-hero-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem);
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 24px;
    }
    .blog-hero-excerpt {
      font-size: 1.05rem; line-height: 1.8; color: var(--text-dim); max-width: 700px;
    }

    /* BLOG CONTENT */
    .blog-container {
      max-width: 900px; margin: 0 auto; padding: 120px 48px;
      width: 100%; box-sizing: border-box;
    }
    .blog-content {
      line-height: 2; color: var(--white); font-size: 1rem;
    }
    .blog-content h2 {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
      margin: 60px 0 30px 0; color: var(--acid);
    }
    .blog-content h3 {
      font-family: 'Noto Sans JP', sans-serif; font-size: 1.4rem;
      font-weight: 700; margin: 40px 0 20px 0;
    }
    .blog-content p {
      margin-bottom: 24px; color: var(--text-dim);
    }
    .blog-content ul, .blog-content ol {
      margin-left: 24px; margin-bottom: 24px;
    }
    .blog-content li {
      margin-bottom: 12px; color: var(--text-dim);
    }
    .blog-content img {
      max-width: 100%; height: auto; margin: 40px 0; border: 1px solid var(--mid);
    }
    .blog-content blockquote {
      border-left: 4px solid var(--acid); padding-left: 24px; margin: 40px 0;
      color: var(--text-dim); font-style: italic;
    }

    /* BLOG META */
    .blog-meta {
      display: flex; gap: 40px; padding: 40px 0; border-top: 1px solid var(--mid);
      border-bottom: 1px solid var(--mid); margin: 60px 0; flex-wrap: wrap;
    }
    .blog-meta-item {
      flex: 1; min-width: 200px;
    }
    .blog-meta-label {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--acid); margin-bottom: 8px;
    }
    .blog-meta-value {
      font-size: 0.95rem; color: var(--white);
    }

    /* RELATED POSTS */
    .related-posts {
      margin-top: 100px; padding-top: 60px; border-top: 1px solid var(--mid);
    }
    .related-posts-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
      margin-bottom: 40px; color: var(--acid);
    }
    .related-posts-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }
    .related-post-card {
      border: 1px solid var(--mid); overflow: hidden;
      transition: border-color 0.3s; cursor: pointer;
    }
    .related-post-card:hover {
      border-color: var(--acid);
    }
    .related-post-thumb {
      width: 100%; aspect-ratio: 16/9; background: var(--gray);
      overflow: hidden;
    }
    .related-post-thumb img {
      width: 100%; height: 100%; object-fit: cover; margin: 0;
    }
    .related-post-body {
      padding: 20px;
    }
    .related-post-category {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--acid);
      margin-bottom: 8px;
    }
    .related-post-title {
      font-weight: 700; margin-bottom: 8px; font-size: 0.95rem;
    }
    .related-post-date {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      color: var(--text-dim);
    }

    /* BACK BUTTON */
    .blog-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--acid); text-decoration: none; margin-bottom: 40px;
      transition: all 0.3s;
    }
    .blog-back:hover {
      gap: 12px;
    }

    /* LOADING STATE */
    .blog-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; gap: 12px; color: var(--text-dim);
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
    }
    .blog-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--acid); animation: dotBlink 1.2s ease-in-out infinite;
    }
    .blog-dot:nth-child(2) { animation-delay: 0.2s; }
    .blog-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBlink {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* FOOTER */
    footer {
      background: var(--gray); padding: 60px 48px; text-align: center;
      border-top: 1px solid var(--mid);
    }
    .footer-logo { margin-bottom: 24px; }
    .footer-logo img { height: 40px; width: auto; }
    .footer-copy { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 24px; }
    .footer-links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .footer-links a { font-size: 0.75rem; color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
    .footer-links a:hover { color: var(--acid); }

    /* REVEAL ANIMATION */
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- NAV -->
  <nav>
    <a href="./" class="nav-logo">
      <img src="./assets/images/senticllc_logo_s.png" alt="SENTIC">
      <span></span>
    </a>
    <div class="nav-links">
      <a href="./#services">サービス</a>
      <a href="./#works">実績</a>
      <a href="./#about">会社概要</a>
      <a href="./#blog">ブログ</a>
    </div>
    <a href="mailto:info@sentic.jp" class="nav-cta">お問い合わせ</a>
  </nav>

  <!-- BLOG HERO -->
  <section class="blog-hero" id="blogHero">
    <img id="blogHeroImg" class="blog-hero-img" alt="Blog Hero">
    <div class="blog-hero-overlay"></div>
    <div class="blog-hero-content">
      <div class="blog-hero-meta">
        <span class="blog-hero-category" id="blogCategory">ARTICLE</span>
        <span class="blog-hero-date" id="blogDate">2024.01.01</span>
      </div>
      <h1 class="blog-hero-title reveal" id="blogTitle">記事タイトルを読み込み中...</h1>
      <p class="blog-hero-excerpt reveal" id="blogExcerpt">記事の概要を読み込み中...</p>
    </div>
  </section>

  <!-- BLOG CONTENT -->
  <div class="blog-container">
    <a href="./#blog" class="blog-back">← ブログ一覧に戻る</a>

    <div id="blogLoadingState" class="blog-loading">
      <div class="blog-dot"></div>
      <div class="blog-dot"></div>
      <div class="blog-dot"></div>
      <span>記事を読み込み中...</span>
    </div>

    <div id="blogContentWrapper" style="display: none;">
      <div class="blog-meta" id="blogMetaSection"></div>
      <div class="blog-content" id="blogContent"></div>
      <div class="related-posts" id="relatedPostsSection" style="display: none;"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo"><img src="./assets/images/senticllc_logo_s.png" alt="SENTIC Logo"></div>
    <div class="footer-copy">© 2024 SENTIC LLC. ALL RIGHTS RESERVED.</div>
    <div class="footer-links">
      <a href="#">プライバシーポリシー</a>
      <a href="#">利用規約</a>
      <a href="#">採用情報</a>
    </div>
  </footer>

  <script>
    // CURSOR
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });
    function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Cursor effect for interactive elements
    function setupCursorEffects() {
      document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => {
          cursor.style.width = '20px';
          cursor.style.height = '20px';
          ring.style.width = '60px';
          ring.style.height = '60px';
        });
        el.addEventListener('mouseleave', () => {
          cursor.style.width = '12px';
          cursor.style.height = '12px';
          ring.style.width = '40px';
          ring.style.height = '40px';
        });
      });
    }
    setupCursorEffects();

    // SCROLL REVEAL
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // =============================================
    // ブログ記事データ取得・表示
    // =============================================
    async function loadBlogDetail() {
      const loadingState = document.getElementById('blogLoadingState');
      const contentWrapper = document.getElementById('blogContentWrapper');

      try {
        // URLから記事IDを取得
        const urlPath = window.location.pathname;
        const blogMatch = urlPath.match(/\/blog\/([a-zA-Z0-9_-]+)/);

        if (!blogMatch) {
          throw new Error('記事IDが見つかりません');
        }

        const blogId = blogMatch[1];

        // microCMS APIから記事データを取得
        const res = await fetch(`/api/blogs?id=${blogId}`);

        if (!res.ok) {
          throw new Error(`API Error: ${res.status}`);
        }

        const data = await res.json();

        if (!data.contents || data.contents.length === 0) {
          throw new Error('記事が見つかりません');
        }

        const article = data.contents[0];

        // ページタイトルを更新
        document.title = `${article.title} - SENTIC`;

        // ヒーロー画像を設定
        const heroImg = document.getElementById('blogHeroImg');
        if (article.eyecatch) {
          heroImg.src = article.eyecatch.url;
        }

        // メタ情報を設定
        document.getElementById('blogCategory').textContent = (article.category?.name || 'ARTICLE').toUpperCase();
        const date = article.publishedAt
          ? new Date(article.publishedAt).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.')
          : '';
        document.getElementById('blogDate').textContent = date;

        // タイトルと概要を設定
        document.getElementById('blogTitle').textContent = article.title || 'タイトルなし';
        document.getElementById('blogExcerpt').textContent = article.description || article.content?.substring(0, 100) || '';

        // メタセクションを生成
        const metaSection = document.getElementById('blogMetaSection');
        metaSection.innerHTML = `
          <div class="blog-meta-item">
            <div class="blog-meta-label">カテゴリー</div>
            <div class="blog-meta-value">${article.category?.name || 'その他'}</div>
          </div>
          <div class="blog-meta-item">
            <div class="blog-meta-label">公開日</div>
            <div class="blog-meta-value">${date}</div>
          </div>
          ${article.author ? `
            <div class="blog-meta-item">
              <div class="blog-meta-label">著者</div>
              <div class="blog-meta-value">${article.author}</div>
            </div>
          ` : ''}
        `;

        // コンテンツを設定
        const contentEl = document.getElementById('blogContent');
        contentEl.innerHTML = article.content || '<p>コンテンツが利用できません</p>';

        // 関連記事を表示（オプション）
        if (article.related_blogs && article.related_blogs.length > 0) {
          const relatedSection = document.getElementById('relatedPostsSection');
          relatedSection.innerHTML = `
            <h2 class="related-posts-title">関連記事</h2>
            <div class="related-posts-grid">
              ${article.related_blogs.map(relatedBlog => `
                <a href="/blog/${relatedBlog.id}" class="related-post-card" style="text-decoration: none; color: inherit;">
                  <div class="related-post-thumb">
                    ${relatedBlog.eyecatch ? `<img src="${relatedBlog.eyecatch.url}" alt="${relatedBlog.title}">` : ''}
                  </div>
                  <div class="related-post-body">
                    <div class="related-post-category">${(relatedBlog.category?.name || 'ARTICLE').toUpperCase()}</div>
                    <div class="related-post-title">${relatedBlog.title}</div>
                    <div class="related-post-date">${new Date(relatedBlog.publishedAt).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.')}</div>
                  </div>
                </a>
              `).join('')}
            </div>
          `;
          relatedSection.style.display = 'block';
        }

        // ローディング非表示、コンテンツ表示
        loadingState.style.display = 'none';
        contentWrapper.style.display = 'block';

        // カーソルエフェクトを再適用
        setupCursorEffects();

      } catch (error) {
        console.error('Blog load error:', error);
        loadingState.innerHTML = `
          <div style="text-align: center; color: var(--text-dim);">
            <p>申し訳ありません。記事の読み込みに失敗しました。</p>
            <p style="margin-top: 16px;"><a href="./" style="color: var(--acid); text-decoration: none;">トップページに戻る</a></p>
          </div>
        `;
      }
    }

    // ページ読み込み時に実行
    document.addEventListener('DOMContentLoaded', loadBlogDetail);
  </script>
</body>
</html>
